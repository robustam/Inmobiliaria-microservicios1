# ===============================
# API GATEWAY
# ===============================
server.port=8080
spring.application.name=api-gateway

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# ===============================
# RUTAS
# ===============================

spring.cloud.gateway.routes[0].id=usuario-service
spring.cloud.gateway.routes[0].uri=lb://usuario-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/usuarios/**

spring.cloud.gateway.routes[1].id=propiedad-service
spring.cloud.gateway.routes[1].uri=lb://propiedad-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/propiedades/**

spring.cloud.gateway.routes[2].id=reservas-service
spring.cloud.gateway.routes[2].uri=lb://reservas-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/reservas/**

spring.cloud.gateway.routes[3].id=pagos-service
spring.cloud.gateway.routes[3].uri=lb://pagos-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/pagos/**