server.port=8087
spring.application.name=promociones-service

# Configuración H2 (Base de datos en memoria)
spring.datasource.url=jdbc:h2:mem:db_promociones
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar consola de H2 y creación automática de tablas
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop

# Conexión a Eureka Server
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Logging
logging.level.root=INFO
logging.level.com.inmobiliaria.promocionesservice=DEBUG