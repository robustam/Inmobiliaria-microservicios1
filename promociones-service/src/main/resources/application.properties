cat > ~/Documents/Inmobiliaria-microservicios1/promociones-service/src/main/resources/application.properties << 'EOF'
server.port=8087
spring.application.name=promociones-service

# H2
spring.datasource.url=jdbc:h2:mem:db_promociones
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=create-drop

# Eureka
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Logging
logging.level.root=INFO
logging.level.com.inmobiliaria.promocionesservice=DEBUG
spring.sql.init.mode=never
EOF