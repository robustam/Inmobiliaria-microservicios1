# Puerto del servicio (el Gateway es 8080, este sera 8081)
server.port=8081

# Nombre para Eureka
spring.application.name=propiedad-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Conexión a Base de Datos MySQL (Asegurate que estos datos coincidan con tu Docker)
spring.datasource.url=jdbc:mysql://localhost:3307/inmobiliariadb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

eureka.instance.prefer-ip-address=true