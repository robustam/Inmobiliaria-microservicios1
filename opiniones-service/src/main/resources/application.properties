server.port=8085
spring.application.name=opiniones-service

# Configuración H2 (Base de datos en memoria)
spring.datasource.url=jdbc:h2:mem:db_opiniones
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar consola de H2 y creación automática de tablas
spring.h2.console.enabled=true
spring.jpa.hibernate.ddl-auto=update

# Conexión a Eureka Server
eureka.client.serviceUrl.defaultZone=http://localhost:8761/eureka/