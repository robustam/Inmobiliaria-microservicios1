# Puerto de este servicio (Gateway = 8080, Propiedades = 8081, Usuarios = 8082)
server.port=8082

# Nombre para Eureka
spring.application.name=usuario-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

# Conexión a la MISMA base de datos MySQL (pero creará su propia tabla)
spring.datasource.url=jdbc:mysql://localhost:3307/inmobiliariadb?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

eureka.instance.prefer-ip-address=true